<svg viewBox="0 0 900 680" width="900" height="680" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="680" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2D3748">1-bit and 2-bit Characters</text>
  
  <!-- Panel 1: INPUT -->
  <rect x="20" y="60" width="270" height="400" rx="16" fill="#EBF4FF" stroke="#BEE3F8" stroke-width="2"/>
  <text x="155" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2B6CB0">INPUT</text>
  
  <!-- Input Array Visualization -->
  <text x="155" y="130" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#4A5568">Binary Array: bits</text>
  
  <!-- Array boxes -->
  <rect x="55" y="150" width="50" height="50" rx="4" fill="#FFFFFF" stroke="#3182CE" stroke-width="2"/>
  <text x="80" y="182" font-family="monospace" font-size="20" text-anchor="middle" fill="#2D3748">1</text>
  <text x="80" y="215" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#718096">[0]</text>
  
  <rect x="115" y="150" width="50" height="50" rx="4" fill="#FFFFFF" stroke="#3182CE" stroke-width="2"/>
  <text x="140" y="182" font-family="monospace" font-size="20" text-anchor="middle" fill="#2D3748">0</text>
  <text x="140" y="215" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#718096">[1]</text>
  
  <rect x="175" y="150" width="50" height="50" rx="4" fill="#FFFFFF" stroke="#3182CE" stroke-width="2"/>
  <text x="200" y="182" font-family="monospace" font-size="20" text-anchor="middle" fill="#2D3748">0</text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#718096">[2]</text>
  
  <!-- Character types explanation -->
  <text x="155" y="260" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#4A5568">Character Types:</text>
  
  <rect x="40" y="275" width="210" height="35" rx="6" fill="#E6FFFA" stroke="#38B2AC" stroke-width="1"/>
  <text x="155" y="297" font-family="monospace" font-size="12" text-anchor="middle" fill="#234E52">1-bit: "0"</text>
  
  <rect x="40" y="320" width="210" height="35" rx="6" fill="#FED7E2" stroke="#D53F8C" stroke-width="1"/>
  <text x="155" y="342" font-family="monospace" font-size="12" text-anchor="middle" fill="#702459">2-bit: "10" or "11"</text>
  
  <!-- Question -->
  <text x="155" y="385" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4A5568">Does last char MUST be</text>
  <text x="155" y="402" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4A5568">1-bit character?</text>
  
  <rect x="50" y="415" width="190" height="30" rx="6" fill="#FFFFFF" stroke="#BEE3F8" stroke-width="1"/>
  <text x="145" y="435" font-family="monospace" font-size="12" text-anchor="middle" fill="#2D3748">bits = [1, 0, 0]</text>
  
  <!-- Arrow 1 -->
  <polygon points="300,260 320,250 320,270" fill="#A0AEC0"/>
  
  <!-- Panel 2: ALGORITHM -->
  <rect x="330" y="60" width="270" height="400" rx="16" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="2"/>
  <text x="465" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#276749">ALGORITHM STEPS</text>
  
  <!-- Step 1 -->
  <circle cx="355" cy="125" r="14" fill="#48BB78"/>
  <text x="355" y="130" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFFFFF">1</text>
  <text x="380" y="122" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748">Initialize pointer i=0</text>
  <text x="380" y="138" font-family="Arial, sans-serif" font-size="11" fill="#4A5568">Start from beginning</text>
  
  <!-- Step 2 -->
  <circle cx="355" cy="175" r="14" fill="#48BB78"/>
  <text x="355" y="180" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFFFFF">2</text>
  <text x="380" y="172" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748">Traverse array</text>
  <text x="380" y="188" font-family="Arial, sans-serif" font-size="11" fill="#4A5568">Stop before last element</text>
  
  <!-- Step 3 -->
  <circle cx="355" cy="225" r="14" fill="#48BB78"/>
  <text x="355" y="230" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFFFFF">3</text>
  <text x="380" y="222" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748">Count 2-bit chars</text>
  <text x="380" y="238" font-family="Arial, sans-serif" font-size="11" fill="#4A5568">If bits[i]=1, skip 2</text>
  
  <!-- Step 4 -->
  <circle cx="355" cy="275" r="14" fill="#48BB78"/>
  <text x="355" y="280" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFFFFF">4</text>
  <text x="380" y="272" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2D3748">Check final position</text>
  <text x="380" y="288" font-family="Arial, sans-serif" font-size="11" fill="#4A5568">i == n-1 means 1-bit</text>
  
  <!-- Execution trace -->
  <rect x="345" y="305" width="240" height="140" rx="8" fill="#FFFFFF" stroke="#9AE6B4" stroke-width="1"/>
  <text x="465" y="325" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#276749">Execution Trace:</text>
  
  <text x="355" y="350" font-family="monospace" font-size="11" fill="#4A5568">i=0: bits[0]=1 --&gt; i+=2</text>
  <text x="355" y="370" font-family="monospace" font-size="11" fill="#4A5568">i=2: i == n-1? YES</text>
  <text x="355" y="395" font-family="monospace" font-size="11" fill="#4A5568">Parsing: [1,0] [0]</text>
  <text x="355" y="415" font-family="monospace" font-size="11" fill="#276749">2-bit   1-bit</text>
  <text x="355" y="435" font-family="monospace" font-size="11" fill="#276749">Last is 1-bit: TRUE</text>
  
  <!-- Arrow 2 -->
  <polygon points="610,260 630,250 630,270" fill="#A0AEC0"/>
  
  <!-- Panel 3: RESULT -->
  <rect x="640" y="60" width="240" height="400" rx="16" fill="#FFFAF0" stroke="#FEEBC8" stroke-width="2"/>
  <text x="760" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#C05621">FINAL RESULT</text>
  
  <!-- Visual parsing -->
  <text x="760" y="130" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#4A5568">Parsed Characters:</text>
  
  <!-- 2-bit character box -->
  <rect x="665" y="145" width="80" height="60" rx="8" fill="#FED7E2" stroke="#D53F8C" stroke-width="2"/>
  <text x="705" y="175" font-family="monospace" font-size="18" text-anchor="middle" fill="#702459">1 0</text>
  <text x="705" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#702459">2-bit</text>
  
  <!-- 1-bit character box -->
  <rect x="765" y="145" width="80" height="60" rx="8" fill="#E6FFFA" stroke="#38B2AC" stroke-width="2"/>
  <text x="805" y="175" font-family="monospace" font-size="18" text-anchor="middle" fill="#234E52">0</text>
  <text x="805" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#234E52">1-bit</text>
  
  <!-- Arrow showing last -->
  <line x1="805" y1="215" x2="805" y2="240" stroke="#38B2AC" stroke-width="2"/>
  <polygon points="805,250 800,240 810,240" fill="#38B2AC"/>
  <text x="805" y="268" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#38B2AC">Last char</text>
  
  <!-- Result box -->
  <rect x="680" y="290" width="160" height="70" rx="10" fill="#48BB78" stroke="#276749" stroke-width="2"/>
  <text x="760" y="320" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#FFFFFF">Output:</text>
  <text x="760" y="345" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" fill="#FFFFFF">true</text>
  
  <!-- Confirmation -->
  <rect x="665" y="380" width="190" height="65" rx="8" fill="#FFFFFF" stroke="#FEEBC8" stroke-width="1"/>
  <text x="760" y="402" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4A5568">Last character MUST</text>
  <text x="760" y="420" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4A5568">be 1-bit because only</text>
  <text x="760" y="438" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#276749">[1,0][0] is valid parse</text>
  
  <!-- Key Insight Box -->
  <rect x="20" y="480" width="860" height="100" rx="12" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="2"/>
  
  <!-- Lightbulb icon -->
  <circle cx="70" cy="520" r="20" fill="#F6E05E"/>
  <circle cx="70" cy="520" r="14" fill="#ECC94B"/>
  <rect x="62" y="542" width="16" height="8" rx="2" fill="#D69E2E"/>
  <rect x="65" y="552" width="10" height="4" rx="1" fill="#D69E2E"/>
  <line x1="70" y1="500" x2="70" y2="508" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="58" y1="512" x2="52" y2="506" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="82" y1="512" x2="88" y2="506" stroke="#FFFFFF" stroke-width="2"/>
  
  <!-- Key Insight text -->
  <text x="110" y="515" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2D3748">Key Insight:</text>
  <text x="110" y="540" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">When we see a '1', we MUST consume the next bit (forming "10" or "11"). By greedily parsing</text>
  <text x="110" y="560" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">from left to right, if pointer lands exactly on last element, it must be a standalone 1-bit char.</text>
  
  <!-- Footer -->
  <line x1="20" y1="620" x2="880" y2="620" stroke="#CBD5E0" stroke-width="1"/>
  <text x="450" y="650" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#718096">TutorialsPoint - 1-bit and 2-bit Characters | Count Two-Bit Characters Approach</text>
</svg>