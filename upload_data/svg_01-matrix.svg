<svg viewBox="0 0 900 680" width="900" height="680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 28px; font-weight: bold; }
      .header { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
      .body { font-family: Arial, sans-serif; font-size: 13px; }
      .small { font-family: Arial, sans-serif; font-size: 11px; }
      .code { font-family: monospace; font-size: 12px; }
      .step-num { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="680" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="450" y="35" class="title" text-anchor="middle" fill="#2D3748">01 Matrix - BFS Distance Calculation</text>
  
  <!-- Panel 1: INPUT (Blue) -->
  <rect x="20" y="55" width="270" height="400" rx="16" fill="#EBF4FF" stroke="#BEE3F8" stroke-width="2"/>
  <text x="155" y="85" class="header" text-anchor="middle" fill="#2B6CB0">INPUT</text>
  
  <!-- Input Matrix Visual -->
  <text x="155" y="110" class="body" text-anchor="middle" fill="#4A5568">Binary Matrix (3x3)</text>
  
  <!-- Matrix Grid -->
  <g transform="translate(65, 125)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="25" y="32" class="header" text-anchor="middle" fill="white">0</text>
    <rect x="60" y="0" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="85" y="32" class="header" text-anchor="middle" fill="white">0</text>
    <rect x="120" y="0" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="145" y="32" class="header" text-anchor="middle" fill="white">0</text>
    
    <!-- Row 1 -->
    <rect x="0" y="60" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="25" y="92" class="header" text-anchor="middle" fill="white">0</text>
    <rect x="60" y="60" width="50" height="50" fill="#FC8181" stroke="#2D3748" stroke-width="2"/>
    <text x="85" y="92" class="header" text-anchor="middle" fill="white">1</text>
    <rect x="120" y="60" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="145" y="92" class="header" text-anchor="middle" fill="white">0</text>
    
    <!-- Row 2 -->
    <rect x="0" y="120" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="25" y="152" class="header" text-anchor="middle" fill="white">0</text>
    <rect x="60" y="120" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="85" y="152" class="header" text-anchor="middle" fill="white">0</text>
    <rect x="120" y="120" width="50" height="50" fill="#48BB78" stroke="#2D3748" stroke-width="2"/>
    <text x="145" y="152" class="header" text-anchor="middle" fill="white">0</text>
  </g>
  
  <!-- Legend -->
  <rect x="50" y="320" width="20" height="20" fill="#48BB78" stroke="#2D3748"/>
  <text x="80" y="335" class="small" fill="#4A5568">0 = Safe Zone</text>
  <rect x="50" y="350" width="20" height="20" fill="#FC8181" stroke="#2D3748"/>
  <text x="80" y="365" class="small" fill="#4A5568">1 = Need Distance</text>
  
  <!-- Input code box -->
  <rect x="35" y="390" width="240" height="55" rx="6" fill="#E2E8F0"/>
  <text x="155" y="412" class="code" text-anchor="middle" fill="#2D3748">mat = [[0,0,0],</text>
  <text x="155" y="428" class="code" text-anchor="middle" fill="#2D3748">[0,1,0],[0,0,0]]</text>
  
  <!-- Arrow 1 -->
  <polygon points="300,255 320,245 320,265" fill="#A0AEC0"/>
  
  <!-- Panel 2: ALGORITHM (Green) -->
  <rect x="315" y="55" width="270" height="400" rx="16" fill="#F0FFF4" stroke="#9AE6B4" stroke-width="2"/>
  <text x="450" y="85" class="header" text-anchor="middle" fill="#276749">ALGORITHM STEPS</text>
  
  <!-- Step 1 -->
  <circle cx="340" cy="115" r="14" fill="#38A169"/>
  <text x="340" y="120" class="step-num" text-anchor="middle">1</text>
  <text x="365" y="112" class="body" font-weight="bold" fill="#2D3748">Initialize</text>
  <text x="365" y="128" class="small" fill="#4A5568">Set 0s dist=0, 1s dist=INF</text>
  
  <!-- Step 2 -->
  <circle cx="340" cy="165" r="14" fill="#38A169"/>
  <text x="340" y="170" class="step-num" text-anchor="middle">2</text>
  <text x="365" y="162" class="body" font-weight="bold" fill="#2D3748">Add Sources</text>
  <text x="365" y="178" class="small" fill="#4A5568">Enqueue all 0 cells to BFS</text>
  
  <!-- Step 3 -->
  <circle cx="340" cy="215" r="14" fill="#38A169"/>
  <text x="340" y="220" class="step-num" text-anchor="middle">3</text>
  <text x="365" y="212" class="body" font-weight="bold" fill="#2D3748">BFS Expansion</text>
  <text x="365" y="228" class="small" fill="#4A5568">Visit neighbors, update dist</text>
  
  <!-- Step 4 -->
  <circle cx="340" cy="265" r="14" fill="#38A169"/>
  <text x="340" y="270" class="step-num" text-anchor="middle">4</text>
  <text x="365" y="262" class="body" font-weight="bold" fill="#2D3748">Complete</text>
  <text x="365" y="278" class="small" fill="#4A5568">All cells have min distance</text>
  
  <!-- BFS Queue Visualization -->
  <text x="450" y="310" class="body" text-anchor="middle" font-weight="bold" fill="#276749">BFS Queue Process:</text>
  
  <rect x="335" y="320" width="200" height="30" rx="4" fill="#C6F6D5" stroke="#38A169"/>
  <text x="345" y="340" class="small" fill="#2D3748">Queue: (0,0)(0,1)(0,2)...</text>
  
  <text x="450" y="370" class="small" text-anchor="middle" fill="#4A5568">Process cell (1,1):</text>
  <text x="450" y="388" class="small" text-anchor="middle" fill="#4A5568">Check 4 neighbors</text>
  
  <!-- Direction arrows -->
  <g transform="translate(410, 405)">
    <polygon points="20,0 25,10 15,10" fill="#38A169"/>
    <polygon points="40,20 30,15 30,25" fill="#38A169"/>
    <polygon points="20,40 15,30 25,30" fill="#38A169"/>
    <polygon points="0,20 10,15 10,25" fill="#38A169"/>
    <rect x="15" y="15" width="10" height="10" fill="#FC8181"/>
  </g>
  <text x="450" y="440" class="small" text-anchor="middle" fill="#4A5568">Min neighbor + 1 = 1</text>
  
  <!-- Arrow 2 -->
  <polygon points="595,255 615,245 615,265" fill="#A0AEC0"/>
  
  <!-- Panel 3: RESULT (Orange) -->
  <rect x="610" y="55" width="270" height="400" rx="16" fill="#FFFAF0" stroke="#FEEBC8" stroke-width="2"/>
  <text x="745" y="85" class="header" text-anchor="middle" fill="#C05621">FINAL RESULT</text>
  
  <!-- Result Matrix -->
  <text x="745" y="115" class="body" text-anchor="middle" fill="#4A5568">Distance Matrix</text>
  
  <g transform="translate(655, 130)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="25" y="32" class="header" text-anchor="middle" fill="#2D3748">0</text>
    <rect x="60" y="0" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="85" y="32" class="header" text-anchor="middle" fill="#2D3748">0</text>
    <rect x="120" y="0" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="145" y="32" class="header" text-anchor="middle" fill="#2D3748">0</text>
    
    <!-- Row 1 -->
    <rect x="0" y="60" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="25" y="92" class="header" text-anchor="middle" fill="#2D3748">0</text>
    <rect x="60" y="60" width="50" height="50" fill="#FED7AA" stroke="#C05621" stroke-width="3"/>
    <text x="85" y="92" class="header" text-anchor="middle" fill="#C05621">1</text>
    <rect x="120" y="60" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="145" y="92" class="header" text-anchor="middle" fill="#2D3748">0</text>
    
    <!-- Row 2 -->
    <rect x="0" y="120" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="25" y="152" class="header" text-anchor="middle" fill="#2D3748">0</text>
    <rect x="60" y="120" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="85" y="152" class="header" text-anchor="middle" fill="#2D3748">0</text>
    <rect x="120" y="120" width="50" height="50" fill="#BEE3F8" stroke="#2D3748" stroke-width="2"/>
    <text x="145" y="152" class="header" text-anchor="middle" fill="#2D3748">0</text>
  </g>
  
  <!-- Explanation -->
  <text x="745" y="320" class="body" text-anchor="middle" fill="#4A5568">Center cell (1,1) has</text>
  <text x="745" y="340" class="body" text-anchor="middle" fill="#4A5568">distance 1 to nearest 0</text>
  
  <!-- Output box -->
  <rect x="625" y="360" width="240" height="40" rx="6" fill="#FEEBC8"/>
  <text x="745" y="385" class="code" text-anchor="middle" fill="#744210">[[0,0,0],[0,1,0],[0,0,0]]</text>
  
  <!-- Status -->
  <rect x="685" y="415" width="120" height="30" rx="8" fill="#48BB78"/>
  <text x="745" y="435" class="header" text-anchor="middle" fill="white">OK - Complete</text>
  
  <!-- Key Insight Box -->
  <rect x="20" y="470" width="860" height="100" rx="12" fill="#EDF2F7" stroke="#CBD5E0" stroke-width="2"/>
  
  <!-- Lightbulb Icon -->
  <g transform="translate(50, 495)">
    <circle cx="20" cy="15" r="18" fill="#F6E05E" stroke="#D69E2E" stroke-width="2"/>
    <circle cx="20" cy="10" r="10" fill="#FEFCBF"/>
    <rect x="14" y="33" width="12" height="8" fill="#D69E2E"/>
    <rect x="16" y="41" width="8" height="3" fill="#B7791F"/>
    <line x1="20" y1="5" x2="20" y2="0" stroke="#D69E2E" stroke-width="2"/>
    <line x1="30" y1="10" x2="35" y2="7" stroke="#D69E2E" stroke-width="2"/>
    <line x1="10" y1="10" x2="5" y2="7" stroke="#D69E2E" stroke-width="2"/>
  </g>
  
  <!-- Insight Text -->
  <text x="110" y="500" class="header" fill="#2D3748">Key Insight:</text>
  <text x="110" y="522" class="body" fill="#4A5568">Multi-source BFS starts from ALL 0s simultaneously. This guarantees minimum distance</text>
  <text x="110" y="540" class="body" fill="#4A5568">because BFS explores level by level. Each 1 is reached by the closest 0 first.</text>
  <text x="110" y="558" class="body" fill="#4A5568">Time: O(m*n) | Space: O(m*n) for the queue</text>
  
  <!-- Footer -->
  <line x1="20" y1="590" x2="880" y2="590" stroke="#CBD5E0" stroke-width="1"/>
  <text x="450" y="615" class="body" text-anchor="middle" fill="#718096">TutorialsPoint - 01 Matrix | BFS Approach</text>
</svg>